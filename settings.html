<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Cài đặt | Đặt/Thuê phòng</title>
    <link href="assets/vendor/fontawesome/css/fontawesome.min.css" rel="stylesheet">
    <link href="assets/vendor/fontawesome/css/solid.min.css" rel="stylesheet">
    <link href="assets/vendor/fontawesome/css/brands.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/master.css" rel="stylesheet">
</head>
<body>
<div class="wrapper">
    <nav id="sidebar" class="active" data-current-page="settings"></nav>

    <div id="body" class="active">
        <div id="topNavbar"></div>

        <div class="content">
            <div class="container">
                <div class="page-title mb-3">
                    <h3>Cài đặt vận hành</h3>
                </div>
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Đối tượng sử dụng</h5>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="rentalMode" id="modeBoth" value="both" checked>
                            <label class="form-check-label" for="modeBoth">Cả ngắn hạn và dài hạn</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="rentalMode" id="modeShort" value="short_term">
                            <label class="form-check-label" for="modeShort">Chỉ ngắn hạn (thu 1 lần)</label>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="radio" name="rentalMode" id="modeLong" value="long_term">
                            <label class="form-check-label" for="modeLong">Chỉ dài hạn (theo chu kỳ tháng)</label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label mb-1" for="shortTermDayThresholdHours">Ngưỡng giờ tính giá ngày (ngắn hạn)</label>
                            <input id="shortTermDayThresholdHours" type="number" min="1" step="1" class="form-control form-control-sm" value="4">
                            <div class="form-text">Nếu thời gian ở lớn hơn ngưỡng này, hệ thống dùng giá ngày; ngược lại dùng giá giờ.</div>
                        </div>
                        <button id="saveSettingsBtn" class="btn btn-primary btn-sm">Lưu cài đặt</button>
                        <div id="settingsMsg" class="small text-muted mt-2"></div>
                    </div>
                </div>
                <div class="card mt-3">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Bật/tắt module menu</h5>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="roomModuleEnabled" checked>
                            <label class="form-check-label" for="roomModuleEnabled">Bật module Đặt/Thuê phòng (gồm lịch và thống kê)</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="transportModuleEnabled" checked>
                            <label class="form-check-label" for="transportModuleEnabled">Bật module Đặt xe (gồm lịch và thống kê)</label>
                        </div>
                        <div class="form-text">Ẩn/hiện các mục tương ứng ở menu bên trái theo tenant hiện tại.</div>
                    </div>
                </div>
                <div class="card mt-3">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Thiết lập giá đặt xe</h5>
                        <div class="row g-2">
                            <div class="col-12 col-md-4">
                                <label class="form-label mb-1">Giá / km</label>
                                <input id="transportPricePerKm" type="number" min="0" step="100" class="form-control form-control-sm" value="6000">
                            </div>
                            <div class="col-12 col-md-4">
                                <label class="form-label mb-1">Giá 1 lít xăng/dầu</label>
                                <input id="transportFuelPricePerLiter" type="number" min="0" step="100" class="form-control form-control-sm" value="22000">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/backend-clientid.js"></script>
<script>
    const modeMap = {
        both: "modeBoth",
        short_term: "modeShort",
        long_term: "modeLong"
    };
    const readMode = () => {
        const selected = document.querySelector("input[name='rentalMode']:checked");
        return selected ? selected.value : "both";
    };
    const setMode = (mode) => {
        const target = document.getElementById(modeMap[mode] || "modeBoth");
        if (target) {
            target.checked = true;
        }
    };
    const readShortTermThreshold = () => {
        const input = document.getElementById("shortTermDayThresholdHours");
        const value = input ? parseInt(input.value || "4", 10) : 4;
        return Number.isFinite(value) && value > 0 ? value : 4;
    };

    const loadSettings = async () => {
        const res = await fetch("backend_settings_get.php");
        const data = await res.json();
        setMode(data.rentalMode || "both");
        const thresholdInput = document.getElementById("shortTermDayThresholdHours");
        if (thresholdInput) {
            thresholdInput.value = data.shortTermDayThresholdHours || 4;
        }
        const roomModuleEnabled = document.getElementById("roomModuleEnabled");
        const transportModuleEnabled = document.getElementById("transportModuleEnabled");
        if (roomModuleEnabled) {
            roomModuleEnabled.checked = data.roomModuleEnabled !== false;
        }
        if (transportModuleEnabled) {
            transportModuleEnabled.checked = data.transportModuleEnabled !== false;
        }
        const setNumberInput = (id, val) => {
            const el = document.getElementById(id);
            if (el) {
                el.value = Number.isFinite(Number(val)) ? Number(val) : 0;
            }
        };
        setNumberInput("transportPricePerKm", data.transportPricePerKm || 6000);
        setNumberInput("transportFuelPricePerLiter", data.transportFuelPricePerLiter || 22000);
    };

    document.getElementById("saveSettingsBtn").addEventListener("click", async () => {
        const msg = document.getElementById("settingsMsg");
        msg.textContent = "Đang lưu...";
        try {
            const roomModuleEnabledEl = document.getElementById("roomModuleEnabled");
            const transportModuleEnabledEl = document.getElementById("transportModuleEnabled");
            await fetch("backend_settings_update.php", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    rentalMode: readMode(),
                    shortTermDayThresholdHours: readShortTermThreshold(),
                    roomModuleEnabled: roomModuleEnabledEl ? !!roomModuleEnabledEl.checked : true,
                    transportModuleEnabled: transportModuleEnabledEl ? !!transportModuleEnabledEl.checked : true,
                    transportPricePerKm: Number(document.getElementById("transportPricePerKm") ? document.getElementById("transportPricePerKm").value : 6000) || 6000,
                    transportFuelPricePerLiter: Number(document.getElementById("transportFuelPricePerLiter") ? document.getElementById("transportFuelPricePerLiter").value : 22000) || 22000
                })
            });
            msg.textContent = "Đã lưu cài đặt thành công.";
        } catch (e) {
            msg.textContent = "Không thể lưu cài đặt.";
        }
    });

    loadSettings();
</script>
<script src="assets/js/sidebar-menu.js"></script>
<script src="assets/js/top-navbar.js"></script>
<script src="assets/vendor/jquery/jquery.min.js"></script>
<script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/script.js"></script>
</body>
</html>
