<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Tổng quan | Đặt/Thuê phòng</title>
    <link href="assets/vendor/fontawesome/css/fontawesome.min.css" rel="stylesheet">
    <link href="assets/vendor/fontawesome/css/solid.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/master.css" rel="stylesheet">
    <style>
        .stat-card { border-left: 4px solid; border-radius: 6px; }
        .stat-card.blue   { border-color: #0d6efd; }
        .stat-card.green  { border-color: #198754; }
        .stat-card.orange { border-color: #fd7e14; }
        .stat-card.purple { border-color: #6f42c1; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; line-height: 1.1; }
        .stat-card .stat-label { font-size: .82rem; color: #6c757d; margin-top: 2px; }
        .stat-card .stat-icon  { font-size: 2rem; opacity: .18; }
        .chart-box { background: #fff; border: 1px solid #dee2e6; border-radius: 6px; padding: 16px; }
        .chart-box h5, .chart-box h6 { font-weight: 600; margin-bottom: 12px; color: #333; }
    </style>
</head>
<body>
<div class="wrapper">
    <nav id="sidebar" class="active" data-current-page="dashboard"></nav>

    <div id="body" class="active">
        <div id="topNavbar"></div>

        <div class="content">
            <div class="container-fluid">
                <div class="page-title">
                    <h3>Tổng quan</h3>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6 col-xl-3">
                        <div class="stat-card blue box p-3 d-flex justify-content-between align-items-center">
                            <div>
                                <div class="stat-value text-primary" id="roomsTotal">—</div>
                                <div class="stat-label">Tổng số phòng</div>
                            </div>
                            <i class="fas fa-bed stat-icon text-primary"></i>
                        </div>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <div class="stat-card green box p-3 d-flex justify-content-between align-items-center">
                            <div>
                                <div class="stat-value text-success" id="reservationsTotal">—</div>
                                <div class="stat-label">Tổng đặt/thuê phòng</div>
                            </div>
                            <i class="fas fa-calendar-check stat-icon text-success"></i>
                        </div>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <div class="stat-card orange box p-3 d-flex justify-content-between align-items-center">
                            <div>
                                <div class="stat-value text-warning" id="totalFinalPrice">—</div>
                                <div class="stat-label">Tổng giá trị còn lại</div>
                            </div>
                            <i class="fas fa-coins stat-icon text-warning"></i>
                        </div>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <div class="stat-card purple box p-3 d-flex justify-content-between align-items-center">
                            <div>
                                <div class="stat-value text-purple" id="averageFinalPrice">—</div>
                                <div class="stat-label">Giá trị trung bình/phòng</div>
                            </div>
                            <i class="fas fa-chart-line stat-icon" style="color:#6f42c1"></i>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-12 col-lg-6">
                        <div class="chart-box h-100">
                            <h6><i class="fas fa-door-open me-1 text-primary"></i>Trạng thái phòng</h6>
                            <ul id="roomsByStatus" class="list-group list-group-flush"></ul>
                        </div>
                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="chart-box h-100">
                            <h6><i class="fas fa-calendar-alt me-1 text-success"></i>Trạng thái đặt/thuê phòng</h6>
                            <ul id="reservationsByStatus" class="list-group list-group-flush"></ul>
                        </div>
                    </div>
                </div>

                <div class="chart-box mb-4">
                    <h6><i class="fas fa-history me-1 text-secondary"></i>5 đặt/thuê phòng gần nhất</h6>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nội dung</th>
                                <th>Thời gian</th>
                                <th>Trạng thái</th>
                                <th class="text-end">Giá còn lại</th>
                            </tr>
                            </thead>
                            <tbody id="latestReservations"></tbody>
                        </table>
                    </div>
                </div>

                <div class="chart-box">
                    <h6><i class="fas fa-chart-bar me-1 text-primary"></i>Doanh thu theo invoice đã thanh toán</h6>
                    <div class="row g-2 mb-3">
                        <div class="col-12 col-md-3">
                            <label class="form-label mb-1">Từ ngày</label>
                            <input id="revenueStartDate" type="date" class="form-control form-control-sm">
                        </div>
                        <div class="col-12 col-md-3">
                            <label class="form-label mb-1">Đến ngày</label>
                            <input id="revenueEndDate" type="date" class="form-control form-control-sm">
                        </div>
                        <div class="col-12 col-md-3">
                            <label class="form-label mb-1">Nhóm theo</label>
                            <select id="revenueGroupBy" class="form-select form-select-sm">
                                <option value="day">Ngày</option>
                                <option value="month">Tháng</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-3 d-flex align-items-end">
                            <button id="revenueFilterBtn" class="btn btn-primary btn-sm w-100">Xem thống kê</button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                            <tr>
                                <th>Kỳ</th>
                                <th class="text-end">Doanh thu</th>
                            </tr>
                            </thead>
                            <tbody id="revenueSeries"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/sidebar-menu.js"></script>
<script src="assets/js/top-navbar.js"></script>
<script src="assets/vendor/jquery/jquery.min.js"></script>
<script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/script.js"></script>
<script src="assets/js/backend-clientid.js"></script>
<script>
    const toCurrency = (v) => `${Number(v || 0).toLocaleString("vi-VN")} đ`;
    const roomStatusLabels = {
        Ready: "Sẵn sàng",
        Cleanup: "Cần dọn",
        Dirty: "Bẩn"
    };
    const reservationStatusLabels = {
        New: "Mới",
        Confirmed: "Đã xác nhận",
        Arrived: "Đã đến",
        CheckedOut: "Đã trả phòng"
    };

    const fillStatus = (targetId, data) => {
        const target = document.getElementById(targetId);
        target.innerHTML = "";
        const keys = Object.keys(data || {});
        if (keys.length === 0) {
            target.innerHTML = "<li class='list-group-item text-muted'>Không có dữ liệu</li>";
            return;
        }
        keys.forEach((key) => {
            const labelMap = targetId === "roomsByStatus" ? roomStatusLabels : reservationStatusLabels;
            const displayLabel = labelMap[key] || key;
            const li = document.createElement("li");
            li.className = "list-group-item d-flex justify-content-between";
            li.innerHTML = `<span>${displayLabel}</span><strong>${data[key]}</strong>`;
            target.appendChild(li);
        });
    };

    const fillLatest = (rows) => {
        const body = document.getElementById("latestReservations");
        body.innerHTML = "";
        if (!rows || rows.length === 0) {
            body.innerHTML = "<tr><td colspan='5' class='text-center text-muted'>Không có dữ liệu</td></tr>";
            return;
        }
        rows.forEach((r) => {
            const displayStatus = reservationStatusLabels[r.status] || r.status;
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${r.id}</td>
                <td>${r.name}</td>
                <td>${r.start} - ${r.end}</td>
                <td>${displayStatus}</td>
                <td class="text-end">${toCurrency(r.finalPrice)}</td>
            `;
            body.appendChild(tr);
        });
    };

    const fillRevenueSeries = (rows) => {
        const body = document.getElementById("revenueSeries");
        body.innerHTML = "";
        if (!rows || rows.length === 0) {
            body.innerHTML = "<tr><td colspan='2' class='text-center text-muted'>Không có dữ liệu</td></tr>";
            return;
        }
        rows.forEach((r) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${r.period}</td><td class="text-end">${toCurrency(r.amount)}</td>`;
            body.appendChild(tr);
        });
    };

    const loadDashboard = async () => {
        const startDate = document.getElementById("revenueStartDate").value;
        const endDate = document.getElementById("revenueEndDate").value;
        const groupBy = document.getElementById("revenueGroupBy").value || "day";
        const params = new URLSearchParams({
            startDate,
            endDate,
            groupBy
        });
        const res = await fetch(`backend_dashboard.php?${params.toString()}`);
        const data = await res.json();

        document.getElementById("roomsTotal").textContent = data.roomsTotal || 0;
        document.getElementById("reservationsTotal").textContent = data.reservationsTotal || 0;
        document.getElementById("totalFinalPrice").textContent = toCurrency(data.totalFinalPrice);
        document.getElementById("averageFinalPrice").textContent = toCurrency(data.averageFinalPrice);

        fillStatus("roomsByStatus", data.roomsByStatus);
        fillStatus("reservationsByStatus", data.reservationsByStatus);
        fillLatest(data.latestReservations);
        fillRevenueSeries(data.revenueSeries);
    };

    const today = new Date().toISOString().slice(0, 10);
    document.getElementById("revenueStartDate").value = today;
    document.getElementById("revenueEndDate").value = today;
    document.getElementById("revenueFilterBtn").addEventListener("click", loadDashboard);
    loadDashboard();
</script>
</body>
</html>
